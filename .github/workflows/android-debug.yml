name: Android Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --force
        working-directory: .

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: Android/src

      - name: Remove strict toolchain constraints
        run: rm -f gradle/gradle-daemon-jvm.properties
        working-directory: Android/src

      - name: Build Debug APK
        run: ./gradlew :addon:assembleDebug -Pandroid.debug.obsoleteApi=true
        working-directory: Android/src
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: addon-debug
          path: Android/src/addon/build/outputs/apk/debug/addon-debug.apk
