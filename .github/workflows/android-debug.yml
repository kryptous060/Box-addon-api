name: Android Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --force
        working-directory: .

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: Android/src

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: Android/src
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # The keystore itself will be base64 encoded as a secret, 
          # decoded in a previous step if needed.
          # For a permanent debug key, the standard debug keystore is 
          # typically in ~/.android/debug.keystore.
          # This workflow assumes you're using the standard Gradle debug config
          # or overriding it.
