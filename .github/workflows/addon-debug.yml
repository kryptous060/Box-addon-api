name: Addon Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install NDK
      run: sdkmanager "ndk;27.0.12077973"
    - name: Build Debug APK
      working-directory: Android
      run: ./gradlew :addon:assembleDebug -Pandroid.debug.obsoleteApi=true
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: addon-debug-apk
        path: Android/src/addon/build/outputs/apk/debug/addon-debug.apk
